<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        * { font-family: 'Roboto', sans-serif; color: black; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        .container { width: 600px; margin: 0 auto; padding: 0 20px; }
        .header-row { display: flex; justify-content: space-between; padding: 5px 0; }
        .header-title { display: flex; align-items: center; justify-content: center; text-align: center; }
        .header-item { flex: 1; padding: 5px; font-size: 12px; font-weight: 500; }
        .header-item.full { flex: 2; }
        .row { display: flex; justify-content: space-between; border: 1.2px solid black; }
        .row2 { display: flex; flex-direction: column; padding-left: 5px; }
        .row-3 { border: 1.2px solid black; margin-top: 20px; }
        .right { border-right: 1.2px solid black; }
        .row-4 { flex-direction: column; border-right: 1.2px solid black; }
        .row5 { display: flex; border: 1.2px solid black; border-top: none; margin-bottom: 20px; }
        .row5-item { width: 50%; display: flex; align-items: center; }
        .table { font-size: 12px; }
        .logo { width: 140px; height: 100px; }
        .contact-info { width: 50%; font-size: 12px; margin-bottom: 10px; }
        .contact-info-container {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid black;
        }
        .header-table { font-size: 14px; font-weight: 500; }
        .subtotal {
            display: flex; justify-content: space-between; border: 1px solid black;
            margin-top: 10px; font-weight: bold;
        }
        .subtotal div { padding: 4px; width: 50%; }
        .subtotal div:nth-child(1) { border-right: 1.2px solid black; }
        .subtotal div:nth-child(2) { text-align: right; }
        .total-amount {
            display: flex; justify-content: space-between; border: 1.2px solid black;
            margin-top: 20px; font-size: 12px; font-weight: 500; width: 70%; margin-left: auto;
        }
        .total-amount div { padding: 4px; }
        .total-amount div:nth-child(1) { border-right: 1.2px solid black; }
        .bank-details { margin-top: 40px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="contact-info-container">
            <img src="{{logoUrl}}" alt="logo" class="logo">
            <div class="contact-info">
                <strong>All Service Marine D.O.O.</strong><br>
                OIB: 84034357097<br>
                Mob.: +385 91 535-59-60<br>
                Phone: +385 91 613-89-41<br>
                E-mail: info@a-s-m.yachts
            </div>
        </div>
        <!-- Canonical company offer layout; PDF export uses offer-export.html (same structure). -->
        <p style="font-size:11px;color:#666;">Reference template — use API export for live data.</p>
    </div>
</body>
</html>
